<!DOCTYPE html>
<html>
<head>
  <title>DSA Hint Helper</title>

  <style>
    :root {
      --bg: #0f172a;
      --card: #1e293b;
      --text: #e2e8f0;
      --accent: #22c55e;
    }

    body {
      font-family: 'Segoe UI', sans-serif;
      width: 340px;
      padding: 12px;
      background: var(--bg);
      color: var(--text);
      transition: all 0.3s ease;
    }

    h3 {
      margin-bottom: 12px;
      text-align: center;
    }

    button {
      width: 100%;
      padding: 10px;
      margin: 6px 0;
      border: none;
      border-radius: 8px;
      background: var(--accent);
      color: white;
      font-weight: bold;
      cursor: pointer;
      transition: transform 0.15s ease, background 0.2s;
    }

    button:hover {
      transform: scale(1.03);
      background: #16a34a;
    }

    button:active {
      transform: scale(0.97);
    }

    .card {
      background: var(--card);
      padding: 10px;
      border-radius: 8px;
      margin-top: 8px;
      display: none;
      opacity: 0;
      transform: translateY(10px);
      transition: all 0.3s ease;
    }

    .card.show {
      display: block;
      opacity: 1;
      transform: translateY(0);
    }

    .loading {
      text-align: center;
      margin: 10px;
      font-style: italic;
      opacity: 0.8;
    }

    .toggle {
      text-align: right;
      font-size: 12px;
      cursor: pointer;
      margin-bottom: 5px;
      opacity: 0.7;
    }

    .light {
      --bg: #f5f5f5;
      --card: #ffffff;
      --text: #111;
    }
  </style>
</head>

<body>

  <div class="toggle" id="themeToggle"> Toggle Theme</div>

  <h3>DSA Hint Helper</h3>

  <button id="getProblem">Get Hints</button>

  <div id="loading" class="loading"></div>

  <button id="hint1Btn" style="display:none;">Hint 1</button>
  <div id="hint1" class="card"></div>

  <button id="hint2Btn" style="display:none;">Hint 2</button>
  <div id="hint2" class="card"></div>

  <button id="hint3Btn" style="display:none;">Hint 3</button>
  <div id="hint3" class="card"></div>

  <script src="config.js"></script>
  <script src="popup.js"></script>
  <script src="popup.js"></script>

</body>
</html>
